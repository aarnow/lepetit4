<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petit 4 — P2P</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind.config.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 font-mono text-p4-text select-none">

<!-- ═══════════════════════════════════════════════
     POPUP P2P — survole tout le contenu
═══════════════════════════════════════════════ -->
<div id="p2p-overlay">
    <div id="p2p-backdrop" onclick="closeP2pLog()"></div>
    <div id="p2p-popup">

        <!-- Header popup -->
        <div class="flex items-center justify-between px-4 py-3 border-b border-p4-border">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-xs font-bold tracking-widest uppercase text-p4-text">Trafic P2P</span>
            </div>
            <div class="flex items-center gap-3">
                <span id="p2p-conn-label" class="text-xs text-p4-muted font-mono">—</span>
                <button onclick="closeP2pLog()"
                        class="text-p4-muted hover:text-p4-text text-sm transition-colors">✕</button>
            </div>
        </div>

        <!-- Légende -->
        <div class="flex gap-4 px-4 py-2 bg-p4-bg border-b border-p4-border">
            <span class="text-xs text-blue-600 font-bold font-mono">↑ SENT</span>
            <span class="text-xs text-green-600 font-bold font-mono">↓ RECV</span>
            <span class="text-xs text-p4-muted font-mono">· SYS</span>
            <span class="ml-auto">
          <button onclick="clearP2pLog()" class="text-xs text-p4-muted hover:text-p4-text transition-colors">effacer</button>
        </span>
        </div>

        <!-- Log entries -->
        <div id="p2p-log" class="px-4 py-2 max-h-64 overflow-y-auto flex flex-col-reverse">
            <p class="text-xs text-p4-muted py-2 text-center">Aucun message pour l'instant</p>
        </div>

    </div>
</div>

<!-- ═══════════════════════════════════════════════
     ÉCRAN DE CONNEXION
═══════════════════════════════════════════════ -->
<div id="screen-connect" class="w-full max-w-sm flex flex-col gap-5">

    <!-- Titre -->
    <div>
        <h1 class="font-display text-4xl font-extrabold tracking-tight text-p4-text leading-none">
            LE PETIT 4
        </h1>
        <p class="text-p4-muted text-xs tracking-widest uppercase">Peer to Peer · 2 joueurs</p>
    </div>

    <!-- Votre ID -->
    <div class="bg-p4-surface border border-p4-border p-4 flex flex-col gap-2">
        <span class="text-p4-muted text-xs tracking-widest uppercase">Votre ID</span>
        <div class="flex items-center justify-between">
            <span id="my-id" class="font-mono text-2xl font-bold tracking-widest text-p4-text">—</span>
            <button id="btn-copy" onclick="uiCopyId()"
                    class="text-xs text-p4-muted border border-p4-border px-3 py-1 hover:border-p4-border2 hover:text-p4-text2 transition-colors">
                copier
            </button>
        </div>
    </div>

    <!-- Actions -->
    <div class="flex flex-col gap-2">

        <button id="btn-host" onclick="uiHostGame()"
                class="w-full bg-p4-text text-white py-3 px-4 text-sm font-bold tracking-wide hover:opacity-90 transition-opacity disabled:opacity-30 disabled:cursor-not-allowed"
                disabled>
            Créer une partie
        </button>

        <div class="flex items-center gap-2 text-p4-muted text-xs">
            <div class="flex-1 h-px bg-p4-border"></div>ou<div class="flex-1 h-px bg-p4-border"></div>
        </div>

        <div class="bg-p4-surface border border-p4-border p-4 flex flex-col gap-3">
            <span class="text-p4-muted text-xs tracking-widest uppercase">Rejoindre</span>
            <div class="flex gap-2">
                <input id="host-id-input" type="text" maxlength="8" placeholder="ID de l'hôte..."
                       class="flex-1 bg-p4-bg border border-p4-border px-3 py-2 text-sm font-mono text-p4-text placeholder-p4-muted outline-none focus:border-p4-border2 transition-colors uppercase" />
                <button onclick="uiJoinGame()"
                        class="px-5 py-2 bg-p4-blue text-white text-sm font-bold hover:opacity-90 transition-opacity">
                    JOIN
                </button>
            </div>
        </div>
    </div>

    <!-- Statut -->
    <div id="connect-status" class="text-p4-muted text-xs text-center min-h-4"></div>
</div>

<!-- ═══════════════════════════════════════════════
     ÉCRAN DE JEU
═══════════════════════════════════════════════ -->
<div id="screen-game" class="hidden w-full max-w-2xl flex flex-col gap-4">

    <!-- Topbar -->
    <div class="flex items-center justify-between">
        <h2 class="font-display text-xl font-extrabold tracking-tight">
            LE PETIT 4
        </h2>
        <div class="flex items-center gap-2">
            <!-- Bouton log P2P -->
            <button onclick="openP2pLog()"
                    class="flex items-center gap-1.5 text-xs border border-p4-border bg-p4-surface px-3 py-1.5 text-p4-text2 hover:border-p4-border2 transition-colors">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                P2P LOG
                <span id="p2p-badge" class="hidden bg-p4-text text-white text-xs font-bold rounded-full w-4 h-4 flex items-center justify-center leading-none">0</span>
            </button>
            <button onclick="uiQuitGame()"
                    class="text-xs border border-p4-border bg-p4-surface px-3 py-1.5 text-p4-text2 hover:border-p4-red hover:text-p4-red transition-colors">
                ✕ Quitter
            </button>
        </div>
    </div>

    <!-- Scores -->
    <div class="grid grid-cols-2 gap-3">

        <div id="player-red-card"
             class="bg-p4-surface border-2 border-p4-border p-3 flex flex-col gap-0.5 transition-all duration-200">
            <div class="flex items-center gap-2 mb-1">
                <div class="w-3 h-3 rounded-full bg-p4-red"></div>
                <span class="text-xs text-p4-muted uppercase tracking-widest">Rouge</span>
            </div>
            <span id="name-red" class="text-sm font-semibold truncate text-p4-text">—</span>
            <span id="score-red" class="text-3xl font-display font-extrabold text-p4-red leading-none">0</span>
        </div>

        <div id="player-blue-card"
             class="bg-p4-surface border-2 border-p4-border p-3 flex flex-col gap-0.5 transition-all duration-200">
            <div class="flex items-center gap-2 mb-1">
                <div class="w-3 h-3 rounded-full bg-p4-blue"></div>
                <span class="text-xs text-p4-muted uppercase tracking-widest">Bleu</span>
            </div>
            <span id="name-blue" class="text-sm font-semibold truncate text-p4-text">—</span>
            <span id="score-blue" class="text-3xl font-display font-extrabold text-p4-blue leading-none">0</span>
        </div>
    </div>

    <!-- Bandeau unique : tour en cours OU résultat de fin de partie -->
    <div id="game-banner"
         class="border-2 border-p4-border bg-p4-surface transition-all duration-300">

        <!-- Vue : tour en cours -->
        <div id="banner-turn" class="flex items-center justify-center gap-3 py-3 px-4">
            <div id="turn-indicator" class="w-5 h-5 rounded-full border-2 border-p4-border transition-all duration-300 flex-shrink-0"></div>
            <span id="turn-label" class="font-display font-extrabold text-lg tracking-tight">—</span>
        </div>

        <!-- Vue : résultat (cachée au départ) -->
        <div id="banner-result" class="hidden flex items-center justify-between gap-4 py-3 px-4">
            <span id="result-text" class="font-display text-2xl font-extrabold"></span>
            <button id="btn-rematch" onclick="uiRequestRematch()"
                    class="text-sm border px-4 py-2 font-mono transition-colors">
                REVANCHE
            </button>
        </div>
    </div>

    <!-- Grille -->
    <div class="bg-p4-surface border border-p4-border p-4">
        <div id="board" class="grid grid-cols-7 gap-2"></div>
    </div>

    <!-- Statut -->
    <div id="game-status" class="text-p4-muted text-xs text-center min-h-4 font-mono"></div>
</div>

<!-- Popup revanche -->
<div id="rematch-overlay" class="fixed inset-0 z-50 pointer-events-none">
    <div id="rematch-backdrop" class="absolute inset-0 bg-black/20 backdrop-blur-sm opacity-0 transition-opacity duration-200"></div>
    <div id="rematch-popup"
         class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 bg-white border border-p4-border shadow-2xl opacity-0 pointer-events-none transition-all duration-200">
        <div class="p-6 flex flex-col gap-4">
            <div class="flex flex-col gap-1">
                <span class="font-display text-lg font-extrabold text-p4-text">Revanche ?</span>
                <p class="text-sm text-p4-text2">L'adversaire souhaite une revanche !</p>
            </div>
            <div class="flex gap-2">
                <button onclick="uiAcceptRematch()"
                        class="flex-1 bg-p4-text text-white text-sm font-bold py-2.5 hover:opacity-90 transition-opacity">
                    Accepter
                </button>
                <button onclick="uiDeclineRematch()"
                        class="flex-1 border border-p4-border text-p4-text2 text-sm font-mono py-2.5 hover:border-p4-red hover:text-p4-red transition-colors">
                    Quitter
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
